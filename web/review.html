<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Core - 主管审核</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        .filters {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .filters input, .filters select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .filters button {
            padding: 8px 16px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        .filters button:hover {
            background: #40a9ff;
        }

        .table-container {
            background: white;
            border-radius: 8px;
            overflow: hidden;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            background: #fafafa;
            font-weight: 600;
            color: #333;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .status-pending {
            color: #faad14;
        }

        .status-approved {
            color: #52c41a;
        }

        .status-rejected {
            color: #ff4d4f;
        }

        .action-link {
            color: #1890ff;
            cursor: pointer;
            text-decoration: none;
        }

        .action-link:hover {
            text-decoration: underline;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            max-width: 1200px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .close-btn {
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        .detail-section {
            margin-bottom: 25px;
        }

        .detail-section h3 {
            margin-bottom: 10px;
            color: #333;
            border-left: 4px solid #1890ff;
            padding-left: 10px;
        }

        .conversation-message {
            padding: 10px;
            margin-bottom: 10px;
            border-radius: 4px;
            max-width: 80%;
        }

        .conversation-message.user {
            background: #e6f7ff;
            margin-right: auto;
        }

        .conversation-message.agent {
            background: #f6ffed;
            margin-left: auto;
            text-align: right;
        }

        .message-meta {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        textarea, input[type="text"] {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
            font-family: inherit;
        }

        textarea {
            resize: vertical;
            min-height: 80px;
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
        }

        .btn-primary {
            background: #1890ff;
            color: white;
        }

        .btn-primary:hover {
            background: #40a9ff;
        }

        .btn-success {
            background: #52c41a;
            color: white;
        }

        .btn-success:hover {
            background: #73d13d;
        }

        .btn-danger {
            background: #ff4d4f;
            color: white;
        }

        .btn-danger:hover {
            background: #ff7875;
        }

        .btn-secondary {
            background: #d9d9d9;
            color: #333;
        }

        .btn-secondary:hover {
            background: #bfbfbf;
        }

        .error-message {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .success-message {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .info-item {
            padding: 10px;
            background: #fafafa;
            border-radius: 4px;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
        }

        .readonly-textarea {
            background: #fafafa;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>主管审核页面</h1>

        <!-- 筛选区 -->
        <div class="filters">
            <select id="filter-status">
                <option value="">全部状态</option>
                <option value="pending_review">待审核</option>
                <option value="approved">已通过</option>
                <option value="rejected">已拒绝</option>
            </select>
            <input type="text" id="filter-project" placeholder="项目">
            <input type="text" id="filter-agent-id" placeholder="客服ID">
            <select id="filter-scenario">
                <option value="">全部场景</option>
                <option value="same_scenario">同类问题场景</option>
                <option value="account_locked">账户锁定处理</option>
                <option value="transfer_not_received">转账成功未到账</option>
                <option value="general_unknown">未知问题咨询</option>
                <option value="final_verification">最终验收验证</option>
                <option value="knowledge_api_test">知识库接口验证</option>
                <option value="test">测试场景</option>
            </select>
            <select id="filter-alert-level">
                <option value="">全部告警等级</option>
                <option value="none">无</option>
                <option value="warning">警告</option>
                <option value="critical">严重</option>
            </select>
            <input type="datetime-local" id="filter-start-time">
            <input type="datetime-local" id="filter-end-time">
            <button onclick="loadTasks()">查询</button>
        </div>

        <!-- 消息提示 -->
        <div id="message-container"></div>

        <!-- 任务列表 -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>任务ID</th>
                        <th>项目</th>
                        <th>客服</th>
                        <th>场景</th>
                        <th>问题类型</th>
                        <th>建议答案</th>
                        <th>告警等级</th>
                        <th>状态</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="tasks-table-body">
                    <tr>
                        <td colspan="10" class="loading">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <!-- 详情模态框 -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>审核任务详情</h2>
                <span class="close-btn" onclick="closeModal()">&times;</span>
            </div>

            <div id="detail-content">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script src="/web/api-client.js"></script>
    <script src="/web/scenario-labels.js"></script>
    <script src="/web/review-page.js"></script>
</body>
</html>
