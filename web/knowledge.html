<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Core - 知识库管理</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            padding: 20px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        /* 筛选区 */
        .filters {
            background: white;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: center;
        }

        .filters input, .filters select {
            padding: 8px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .filters button {
            padding: 8px 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .btn-primary {
            background: #1890ff;
            color: white;
        }

        .btn-primary:hover {
            background: #40a9ff;
        }

        .btn-secondary {
            background: #d9d9d9;
            color: #333;
        }

        .btn-secondary:hover {
            background: #bfbfbf;
        }

        .btn-success {
            background: #52c41a;
            color: white;
        }

        .btn-success:hover {
            background: #73d13d;
        }

        .btn-danger {
            background: #ff4d4f;
            color: white;
        }

        .btn-danger:hover {
            background: #ff7875;
        }

        .btn-link {
            background: none;
            border: none;
            color: #1890ff;
            cursor: pointer;
            font-size: 14px;
            padding: 0;
        }

        .btn-link:hover {
            text-decoration: underline;
        }

        /* 表格 */
        .table-container {
            background: white;
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            background: #fafafa;
            font-weight: 600;
            color: #333;
        }

        tr:hover {
            background: #f5f5f5;
        }

        .action-group {
            display: flex;
            gap: 8px;
        }

        /* 模态框 */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
        }

        .modal.active {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            border-radius: 8px;
            max-width: 1200px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            padding: 30px;
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 2px solid #f0f0f0;
        }

        .close-btn {
            font-size: 28px;
            cursor: pointer;
            color: #999;
        }

        .close-btn:hover {
            color: #333;
        }

        /* 表单 */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }

        .form-group input,
        .form-group textarea,
        .form-group select {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }

        .form-group textarea {
            min-height: 100px;
            resize: vertical;
        }

        .form-actions {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            padding-top: 20px;
            border-top: 1px solid #f0f0f0;
        }

        /* 详情区块 */
        .detail-section {
            margin-bottom: 20px;
        }

        .detail-section h3 {
            margin-bottom: 10px;
            color: #333;
            font-size: 16px;
        }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 15px;
        }

        .info-item {
            padding: 12px;
            background: #fafafa;
            border-radius: 4px;
        }

        .info-label {
            font-size: 12px;
            color: #999;
            margin-bottom: 5px;
        }

        .info-value {
            font-size: 14px;
            color: #333;
            font-weight: 500;
            word-break: break-all;
        }

        /* 标签 */
        .tag {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .tag-active {
            background: #f6ffed;
            color: #52c41a;
        }

        .tag-deprecated {
            background: #f0f0f0;
            color: #999;
        }

        /* JSON 显示 */
        .json-display {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 4px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            overflow-x: auto;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        /* 消息提示 */
        .error-message {
            background: #fff2f0;
            border: 1px solid #ffccc7;
            color: #ff4d4f;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .success-message {
            background: #f6ffed;
            border: 1px solid #b7eb8f;
            color: #52c41a;
            padding: 10px;
            border-radius: 4px;
            margin-bottom: 15px;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 20px;
        }

        .pagination button {
            padding: 6px 12px;
            border: 1px solid #ddd;
            background: white;
            cursor: pointer;
            border-radius: 4px;
        }

        .pagination button:hover:not(:disabled) {
            background: #1890ff;
            color: white;
            border-color: #1890ff;
        }

        .pagination button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* 数组显示 */
        .array-display {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .array-item {
            background: #e6f7ff;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 13px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>知识库管理</h1>

        <!-- 筛选区 -->
        <div class="filters">
            <input type="text" id="filter-project" placeholder="项目">
            <select id="filter-scenario">
                <option value="">全部场景</option>
                <option value="same_scenario">同类问题场景</option>
                <option value="account_locked">账户锁定处理</option>
                <option value="transfer_not_received">转账成功未到账</option>
                <option value="general_unknown">未知问题咨询</option>
                <option value="final_verification">最终验收验证</option>
                <option value="knowledge_api_test">知识库接口验证</option>
                <option value="test">测试场景</option>
            </select>
            <select id="filter-status">
                <option value="">全部状态</option>
                <option value="active">启用</option>
                <option value="deprecated">停用</option>
            </select>
            <input type="text" id="filter-keyword" placeholder="关键词搜索">
            <button class="btn-primary" onclick="loadKnowledgeList()">查询</button>
            <button class="btn-secondary" onclick="resetFilters()">重置</button>
            <button class="btn-success" onclick="openCreateModal()">+ 新增知识</button>
        </div>

        <!-- 消息提示 -->
        <div id="message-container"></div>

        <!-- 知识列表 -->
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th>知识ID</th>
                        <th>项目</th>
                        <th>场景</th>
                        <th>问法</th>
                        <th>标准答案</th>
                        <th>版本</th>
                        <th>状态</th>
                        <th>来源审核</th>
                        <th>来源分析</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="knowledge-table-body">
                    <tr>
                        <td colspan="11" class="loading">加载中...</td>
                    </tr>
                </tbody>
            </table>
        </div>

        <!-- 分页 -->
        <div class="pagination" id="pagination"></div>
    </div>

    <!-- 详情模态框 -->
    <div id="detail-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>知识详情</h2>
                <span class="close-btn" onclick="closeModal('detail-modal')">&times;</span>
            </div>

            <div id="detail-content">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑模态框 -->
    <div id="edit-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="edit-modal-title">新增知识</h2>
                <span class="close-btn" onclick="closeModal('edit-modal')">&times;</span>
            </div>

            <form id="edit-form" onsubmit="return false;">
                <div class="form-group">
                    <label>项目 *</label>
                    <input type="text" id="form-project" required>
                </div>

                <div class="form-group">
                    <label>场景 *</label>
                    <input type="text" id="form-scenario" required>
                </div>

                <div class="form-group">
                    <label>问法别名（每行一个）*</label>
                    <textarea id="form-aliases" required placeholder="我转账成功了但对方没收到&#10;钱扣了但是没到账"></textarea>
                </div>

                <div class="form-group">
                    <label>标准答案 *</label>
                    <textarea id="form-answer" required></textarea>
                </div>

                <div class="form-group">
                    <label>关键词（逗号分隔）</label>
                    <input type="text" id="form-keywords" placeholder="转账, 没到账">
                </div>

                <div class="form-group">
                    <label>必填信息（逗号分隔）</label>
                    <input type="text" id="form-required" placeholder="付款截图, 订单号, 付款时间">
                </div>

                <div class="form-group">
                    <label>禁止内容（逗号分隔）</label>
                    <input type="text" id="form-forbidden" placeholder="">
                </div>

                <input type="hidden" id="form-knowledge-id">
                <input type="hidden" id="form-update-reason">

                <div class="form-actions">
                    <button class="btn-secondary" onclick="closeModal('edit-modal')">取消</button>
                    <button class="btn-primary" onclick="submitKnowledge()">提交</button>
                </div>
            </form>
        </div>
    </div>

    <!-- 版本历史模态框 -->
    <div id="versions-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>版本历史</h2>
                <span class="close-btn" onclick="closeModal('versions-modal')">&times;</span>
            </div>

            <div id="versions-content">
                <div class="loading">加载中...</div>
            </div>
        </div>
    </div>

    <script src="/web/api-client.js"></script>
    <script src="/web/scenario-labels.js"></script>
    <script src="/web/knowledge-page.js"></script>
</body>
</html>
