<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trainer Core - 管理后台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: #f5f5f5;
            overflow: hidden;
        }

        /* 顶部标题栏 */
        .header {
            height: 56px;
            background: #001529;
            color: white;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 24px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
        }

        .header-title {
            font-size: 18px;
            font-weight: 600;
        }

        .header-info {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.65);
        }

        /* 主布局 */
        .main-layout {
            display: flex;
            height: calc(100vh - 56px);
        }

        /* 左侧导航栏 */
        .sidebar {
            width: 220px;
            background: white;
            border-right: 1px solid #e8e8e8;
            padding: 16px 0;
            overflow-y: auto;
        }

        .nav-menu {
            list-style: none;
        }

        .nav-item {
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s;
            color: #333;
            font-size: 14px;
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            background: #f5f5f5;
            color: #1890ff;
        }

        .nav-item.active {
            background: #e6f7ff;
            color: #1890ff;
            border-left-color: #1890ff;
            font-weight: 500;
        }

        /* 右侧内容区 */
        .content {
            flex: 1;
            position: relative;
            background: #f5f5f5;
        }

        .content-iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }

        /* 加载提示 */
        .loading-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(255, 255, 255, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }

        .loading-overlay.hidden {
            display: none;
        }

        .loading-text {
            font-size: 16px;
            color: #999;
        }

        /* 错误提示 */
        .error-message {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: #ff4d4f;
            padding: 20px;
            background: white;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            max-width: 400px;
        }

        .error-message.hidden {
            display: none;
        }

        .error-title {
            font-size: 18px;
            font-weight: 600;
            margin-bottom: 8px;
        }

        .error-desc {
            font-size: 14px;
            color: #666;
            margin-bottom: 16px;
        }

        .error-retry {
            padding: 8px 16px;
            background: #1890ff;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }

        .error-retry:hover {
            background: #40a9ff;
        }
    </style>
</head>
<body>
    <!-- 顶部标题栏 -->
    <div class="header">
        <div class="header-title">Trainer Core 管理后台</div>
        <div class="header-info">
            <span>环境：本地开发</span>
            <span style="margin-left: 16px;">服务：localhost:3001</span>
        </div>
    </div>

    <!-- 主布局 -->
    <div class="main-layout">
        <!-- 左侧导航栏 -->
        <div class="sidebar">
            <ul class="nav-menu">
                <li class="nav-item active" data-page="dashboard" data-url="/web/dashboard.html">
                    基础统计
                </li>
                <li class="nav-item" data-page="review" data-url="/web/review.html">
                    主管审核
                </li>
                <li class="nav-item" data-page="quality" data-url="/web/quality.html">
                    质检记录
                </li>
                <li class="nav-item" data-page="knowledge" data-url="/web/knowledge.html">
                    知识库管理
                </li>
            </ul>
        </div>

        <!-- 右侧内容区 -->
        <div class="content">
            <!-- 加载提示 -->
            <div class="loading-overlay" id="loading">
                <div class="loading-text">加载中...</div>
            </div>

            <!-- 错误提示 -->
            <div class="error-message hidden" id="error">
                <div class="error-title">加载失败</div>
                <div class="error-desc" id="error-desc">页面加载出现问题</div>
                <button class="error-retry" onclick="retryLoad()">重新加载</button>
            </div>

            <!-- iframe 内容区 -->
            <iframe id="content-iframe" class="content-iframe" src="/web/dashboard.html"></iframe>
        </div>
    </div>

    <script src="/web/index-page.js"></script>
</body>
</html>
